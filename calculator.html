<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity 프리미엄 업무용 바다 계산기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* DESIGN.md에 정의된 디자인 시스템 토큰을 CSS 변수로 완벽 매핑 */
        :root {
            --color-background: #f4faff;
            --color-surface-tint: #356477;
            --color-on-surface: #001f2a;
            --color-primary: #356477;         /* 스카이 블루 (오퍼레이터용) */
            --color-on-primary: #ffffff;
            --color-secondary: #006399;       /* 오션 블루 (이퀄 버튼용) */
            --color-on-secondary: #ffffff;
            --color-tertiary-container: #e7e1d3; /* 샌디 베이지 (기록/칩 배경용) */
            --color-on-tertiary-container: #676459;

            /* 글래스모피즘용 특수 컬러 (Sea Foam 효과) */
            --calc-bg: rgba(255, 255, 255, 0.5); /* #FFFFFF80 서피스 효과 */
            --calc-border: rgba(255, 255, 255, 0.3); /* 빛 반사를 위한 30% 화이트 테두리 */
            --btn-numeric-bg: rgba(255, 255, 255, 0.6);
            --btn-shadow: 0px 4px 10px rgba(0, 119, 182, 0.08); /* 부드러운 blue-tinted shadow (8%) */

            /* 여백 & 라운드값 (Spacing & Shapes) */
            --spacing-lg: 32px;      /* 내부 패딩 */
            --spacing-sm: 12px;      /* 버튼 사이 간격 */
            --rounded-lg: 16px;      /* 일반 버튼 및 디스플레이 코너 */
            --rounded-xl: 24px;      /* 메인 컨테이너 코너 */
        }

        [data-theme="dark"] {
            --color-background: #163440;
            --color-on-surface: #e0f4ff;
            --calc-bg: rgba(0, 31, 42, 0.45);
            --calc-border: rgba(255, 255, 255, 0.1);
            --btn-numeric-bg: rgba(255, 255, 255, 0.1);
            --btn-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.1s ease;
        }

        body {
            background: linear-gradient(135deg, var(--color-background) 0%, #eef7fc 50%, #e7e1d3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-lg);
        }

        .app-container {
            display: flex;
            gap: 24px;
            max-width: 900px;
            width: 100%;
        }

        /* Level 1: 메인 계산기 몸체 (The Glass Base) */
        .glass-panel {
            background: var(--calc-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--calc-border);
            border-radius: var(--rounded-xl);
            box-shadow: 0 20px 40px rgba(0, 31, 42, 0.06);
        }

        .calculator {
            flex: 1.2;
            padding: var(--spacing-lg);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calc-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--color-surface-tint);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .calc-title span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--color-secondary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--color-secondary);
        }

        .header-controls {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: var(--btn-numeric-bg);
            border: 1px solid var(--calc-border);
            color: var(--color-on-surface);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            box-shadow: var(--btn-shadow);
        }

        .icon-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.8);
        }

        /* 계산기 디스플레이 구조 정의 */
        .display-area {
            background: transparent;
            padding: 10px 0;
            text-align: right;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: none;
        }

        .formula-screen {
            font-size: 16px;
            color: var(--color-surface-tint);
            min-height: 24px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .result-screen {
            font-size: 48px;
            font-weight: 700;
            line-height: 56px;
            letter-spacing: -0.02em;
            color: var(--color-on-surface);
            text-shadow: 0px 2px 8px rgba(53, 100, 119, 0.15);
            overflow-x: auto;
            white-space: nowrap;
        }

        .result-screen::-webkit-scrollbar {
            display: none;
        }

        /* 버튼 그리드 레이아웃 */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-sm);
        }

        /* Level 2: 공통 버튼 스타일 (Pebble 조약돌 형태) */
        .btn {
            border: 1px solid var(--calc-border);
            border-radius: var(--rounded-lg);
            height: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--btn-shadow);
            user-select: none;
        }

        .btn:hover {
            transform: translateY(-1px);
            background-color: rgba(255, 255, 255, 0.8);
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: none;
        }

        /* 각 컴포넌트별 색상 분기 */
        .btn-numeric {
            background: var(--btn-numeric-bg);
            color: var(--color-on-surface);
        }

        .btn-operator {
            background: var(--color-primary);
            color: var(--color-on-primary);
        }
        .btn-operator:hover {
            background: #2a5263;
        }

        .btn-equal {
            background: var(--color-secondary);
            color: var(--color-on-secondary);
            font-weight: 700;
        }
        .btn-equal:hover {
            background: #005280;
        }

        .btn-utility {
            background: rgba(255, 255, 255, 0.3);
            color: var(--color-surface-tint);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* 기록 패널 (Sandy Beige 적용) */
        .history-panel {
            flex: 0.8;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 560px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--calc-border);
            padding-bottom: 10px;
        }

        .history-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-on-surface);
        }

        .clear-history-btn {
            background: transparent;
            border: none;
            color: var(--color-surface-tint);
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }

        .clear-history-btn:hover {
            color: #ba1a1a;
        }

        .history-list {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--color-surface-tint);
            border-radius: 10px;
        }

        .history-empty {
            color: var(--color-surface-tint);
            text-align: center;
            font-size: 14px;
            margin-top: 40px;
            font-style: italic;
        }

        /* 알약 형태의 역사/히스토리 칩 디자인 */
        .history-item {
            background-color: var(--color-tertiary-container);
            color: var(--color-on-tertiary-container);
            border: 1px solid var(--calc-border);
            padding: 12px 14px;
            border-radius: var(--rounded-lg);
            cursor: pointer;
            text-align: right;
        }

        .history-item:hover {
            transform: translateX(-4px);
            background: rgba(255, 255, 255, 0.4);
        }

        .history-item-formula {
            font-size: 12px;
            color: var(--color-on-tertiary-container);
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .history-item-result {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-on-surface);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-on-surface);
            color: var(--color-background);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                gap: 16px;
            }
            .calculator {
                flex: 1;
            }
            .history-panel {
                flex: 1;
                max-height: 250px;
            }
        }
    </style>
</head>
<body data-theme="light">

    <div class="app-container">
        
        <main class="calculator glass-panel">
            
            <div class="calc-header">
                <h1 class="calc-title">
                    <span></span> Ocean Calculator
                </h1>
                <div class="header-controls">
                    <button class="icon-btn" id="copy-btn" title="결과값 복사" onclick="copyToClipboard()">📋</button>
                    <button class="icon-btn" id="theme-btn" title="다크/라이트 모드 변경" onclick="toggleTheme()">🌙</button>
                </div>
            </div>

            <div class="display-area">
                <div class="formula-screen" id="formula-display"></div>
                <div class="result-screen" id="result-display">0</div>
            </div>

            <div class="buttons-grid">
                <button class="btn btn-utility" onclick="clearAll()">C</button>
                <button class="btn btn-utility" onclick="backspace()">⌫</button>
                <button class="btn btn-operator" onclick="appendOperator('%')">%</button>
                <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>

                <button class="btn btn-numeric" onclick="appendNumber('7')">7</button>
                <button class="btn btn-numeric" onclick="appendNumber('8')">8</button>
                <button class="btn btn-numeric" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

                <button class="btn btn-numeric" onclick="appendNumber('4')">4</button>
                <button class="btn btn-numeric" onclick="appendNumber('5')">5</button>
                <button class="btn btn-numeric" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="appendOperator('-')">-</button>

                <button class="btn btn-numeric" onclick="appendNumber('1')">1</button>
                <button class="btn btn-numeric" onclick="appendNumber('2')">2</button>
                <button class="btn btn-numeric" onclick="appendNumber('3')">3</button>
                <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

                <button class="btn btn-numeric" onclick="appendNumber('0')">0</button>
                <button class="btn btn-numeric" onclick="appendNumber('00')">00</button>
                <button class="btn btn-numeric" onclick="appendDecimal()">.</button>
                <button class="btn btn-equal" onclick="runCalculate()">=</button>

                <button class="btn btn-utility" onclick="calculateVAT('include')" title="공급가에 부가세 10% 더하기">VAT +10%</button>
                <button class="btn btn-utility" onclick="calculateVAT('exclude')" title="합계금액에서 부가세 10% 제외하기">VAT -10%</button>
                <button class="btn btn-utility" onclick="calculateVAT('taxOnly')" title="공급가의 10% 세액만 추출">VAT 세액</button>
                <button class="btn btn-utility" onclick="calculateVAT('taxInside')" title="합계금액 내부 부가세(1/11) 추출">VAT 내부세</button>
            </div>

        </main>

        <aside class="history-panel glass-panel">
            <div class="history-header">
                <h2 class="history-title">계산 기록 (History)</h2>
                <button class="clear-history-btn" onclick="clearHistory()">모두 비우기</button>
            </div>
            <div class="history-list" id="history-container">
                <div class="history-empty" id="history-empty-text">기록이 없습니다.</div>
            </div>
        </aside>

    </div>

    <div class="toast" id="toast-message">
        <span>✅</span> 결과값이 클립보드에 복사되었습니다!
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let selectedOperator = '';
        let shouldResetDisplay = false;
        let calculationHistory = [];

        const formulaDisplay = document.getElementById('formula-display');
        const resultDisplay = document.getElementById('result-display');
        const historyContainer = document.getElementById('history-container');
        const historyEmptyText = document.getElementById('history-empty-text');
        const toastMessage = document.getElementById('toast-message');

        window.onload = function() {
            const savedHistory = localStorage.getItem('calc_history');
            if (savedHistory) {
                calculationHistory = JSON.parse(savedHistory);
                renderHistory();
            }
        };

        function formatNumberWithCommas(numberString) {
            const parts = numberString.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        function cleanCommas(formattedString) {
            return formattedString.replace(/,/g, '');
        }

        function updateDisplay() {
            resultDisplay.textContent = formatNumberWithCommas(currentInput);
            if (selectedOperator && previousInput !== '') {
                let opChar = selectedOperator;
                if (selectedOperator === '*') opChar = '×';
                if (selectedOperator === '/') opChar = '÷';
                formulaDisplay.textContent = `${formatNumberWithCommas(previousInput)} ${opChar}`;
            } else {
                formulaDisplay.textContent = '';
            }
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                if (currentInput === '0') {
                    if (num === '00' || num === '0') {
                        currentInput = '0';
                    } else {
                        currentInput = num;
                    }
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0.';
                shouldResetDisplay = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }

        function appendOperator(operator) {
            if (selectedOperator && !shouldResetDisplay) {
                executeMath();
            }
            previousInput = currentInput;
            selectedOperator = operator;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function backspace() {
            if (shouldResetDisplay) return;
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            selectedOperator = '';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function executeMath() {
            let result = 0;
            const prev = parseFloat(cleanCommas(previousInput));
            const current = parseFloat(cleanCommas(currentInput));

            if (isNaN(prev) || isNaN(current)) return;

            switch (selectedOperator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/':
                    if (current === 0) {
                        alert('0으로 나눌 수 없습니다!');
                        clearAll();
                        return;
                    }
                    result = prev / current;
                    break;
                case '%': result = (prev * current) / 100; break;
                default: return;
            }
            currentInput = parseFloat(result.toFixed(10)).toString();
        }

        function runCalculate() {
            if (!selectedOperator || previousInput === '') return;
            const formulaText = `${formatNumberWithCommas(previousInput)} ${selectedOperator === '*' ? '×' : selectedOperator === '/' ? '÷' : selectedOperator} ${formatNumberWithCommas(currentInput)}`;
            executeMath();
            const resultText = formatNumberWithCommas(currentInput);
            addHistoryItem(formulaText, resultText);
            selectedOperator = '';
            previousInput = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculateVAT(type) {
            const rawVal = parseFloat(cleanCommas(currentInput));
            if (isNaN(rawVal) || rawVal === 0) return;

            let result = 0;
            let title = '';
            let formula = '';

            switch (type) {
                case 'include':
                    result = rawVal * 1.1;
                    title = 'VAT +10% (포함)';
                    formula = `${formatNumberWithCommas(rawVal.toString())} + 10% VAT`;
                    break;
                case 'exclude':
                    result = rawVal / 1.1;
                    title = 'VAT -10% (제외)';
                    formula = `${formatNumberWithCommas(rawVal.toString())} ÷ 1.1`;
                    break;
                case 'taxOnly':
                    result = rawVal * 0.1;
                    title = 'VAT 10% 세액';
                    formula = `${formatNumberWithCommas(rawVal.toString())} × 0.1`;
                    break;
                case 'taxInside':
                    result = rawVal / 11;
                    title = 'VAT 내부세 (1/11)';
                    formula = `${formatNumberWithCommas(rawVal.toString())} ÷ 11`;
                    break;
            }

            result = Math.round(result);
            const resultText = formatNumberWithCommas(result.toString());
            const formulaText = `[${title}] ${formula}`;

            currentInput = result.toString();
            updateDisplay();
            addHistoryItem(formulaText, resultText);
            shouldResetDisplay = true;
        }

        function addHistoryItem(formula, result) {
            const newItem = { formula, result };
            calculationHistory.unshift(newItem);
            if (calculationHistory.length > 30) calculationHistory.pop();
            localStorage.setItem('calc_history', JSON.stringify(calculationHistory));
            renderHistory();
        }

        function renderHistory() {
            const items = historyContainer.querySelectorAll('.history-item');
            items.forEach(el => el.remove());

            if (calculationHistory.length === 0) {
                historyEmptyText.style.display = 'block';
                return;
            }
            historyEmptyText.style.display = 'none';

            calculationHistory.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = function() {
                    currentInput = cleanCommas(item.result);
                    shouldResetDisplay = true;
                    updateDisplay();
                };
                div.innerHTML = `
                    <div class="history-item-formula">${item.formula}</div>
                    <div class="history-item-result">${item.result}</div>
                `;
                historyContainer.appendChild(div);
            });
        }

        function clearHistory() {
            if (confirm('모든 계산 기록을 지우시겠습니까?')) {
                calculationHistory = [];
                localStorage.removeItem('calc_history');
                renderHistory();
            }
        }

        function copyToClipboard() {
            const valueToCopy = formatNumberWithCommas(currentInput);
            navigator.clipboard.writeText(valueToCopy).then(() => {
                toastMessage.classList.add('show');
                setTimeout(() => { toastMessage.classList.remove('show'); }, 2000);
            }).catch(err => { console.error('복사 실패:', err); });
        }

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
                themeBtn.title = '라이트 모드로 전환';
            } else {
                body.setAttribute('data-theme', 'light');
                themeBtn.textContent = '🌙';
                themeBtn.title = '다크 모드로 전환';
            }
        }
    </script>
</body>
</html>
