<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>janytree 프리미엄 웹 계산기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* DESIGN.md 명세서 토큰 및 색상 정의 */
        :root {
            --bg-color: #f4faff;
            --surface-tint: #356477;
            --on-surface: #001f2a;
            --primary: #356477;         /* 스카이 블루 (연산자 버튼) */
            --secondary: #006399;       /* 오션 블루 (등호 버튼) */
            --tertiary-container: #e7e1d3; /* 샌디 베이지 */
            
            /* 반투명 글래스모피즘 (Sea Foam 효과) */
            --calc-bg: rgba(255, 255, 255, 0.45); 
            --calc-border: rgba(255, 255, 255, 0.3);
            --btn-numeric-bg: rgba(255, 255, 255, 0.6);
            --btn-shadow: 0px 4px 10px rgba(0, 119, 182, 0.08);
        }

        [data-theme="dark"] {
            --bg-color: #163440;
            --on-surface: #e0f4ff;
            --calc-bg: rgba(0, 31, 42, 0.45);
            --calc-border: rgba(255, 255, 255, 0.1);
            --btn-numeric-bg: rgba(255, 255, 255, 0.1);
            --btn-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* 하단 물결 그라데이션 장식 */
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35vh;
            background: linear-gradient(180deg, transparent 0%, #b9e9ff 60%, #ceedfd 100%);
            border-top-left-radius: 50% 15%;
            border-top-right-radius: 50% 15%;
            z-index: 1;
            opacity: 0.7;
        }

        /* 상단 및 하단 브랜드 로고 영역 */
        .brand-header {
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 700;
            color: #194c5e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo::before {
            content: '♩';
            display: inline-flex;
            width: 28px;
            height: 28px;
            background: #194c5e;
            color: #ffffff;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }

        .header-menu {
            display: flex;
            gap: 16px;
            color: #194c5e;
            font-size: 18px;
            cursor: pointer;
        }

        .brand-footer {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 18px;
            font-weight: 700;
            color: #194c5e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .brand-footer::before {
            content: '♩';
            display: inline-flex;
            width: 22px;
            height: 22px;
            background: #194c5e;
            color: #ffffff;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        /* 메인 아일랜드 계산기 본체 */
        .calculator-island {
            background: var(--calc-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--calc-border);
            width: 100%;
            max-width: 380px;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 24px 48px rgba(0, 31, 42, 0.06);
            z-index: 5;
            position: relative;
        }

        .display-container {
            text-align: right;
            padding: 10px 4px 20px 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .formula-screen {
            font-size: 15px;
            color: var(--surface-tint);
            min-height: 22px;
            font-weight: 500;
            opacity: 0.6;
        }

        .result-screen {
            font-size: 44px;
            font-weight: 700;
            color: var(--on-surface);
            letter-spacing: -0.01em;
        }

        /* 4열 격자 자판 */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            border: 1px solid var(--calc-border);
            border-radius: 18px;
            height: 56px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--btn-shadow);
            user-select: none;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.85);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: none;
        }

        .btn-numeric {
            background: var(--btn-numeric-bg);
            color: var(--on-surface);
        }

        .btn-operator {
            background: var(--primary);
            color: #ffffff;
        }

        .btn-equal {
            background: var(--secondary);
            color: #ffffff;
            font-weight: 700;
        }

        .btn-utility {
            background: rgba(255, 255, 255, 0.3);
            color: var(--surface-tint);
        }

        .btn-vat {
            font-size: 11px;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        /* 히스토리 서랍장 */
        .history-drawer {
            position: fixed;
            top: 70px;
            right: 24px;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--calc-border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            display: none;
        }
        
        .history-drawer.show { display: block; }
        .history-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .history-list { max-height: 200px; overflow-y: auto; font-size: 12px; }
        .history-item { padding: 6px; border-bottom: 1px solid #eee; text-align: right; cursor: pointer; }
        .history-item:hover { background: #f0f8ff; }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--on-surface);
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="brand-header">
        <div class="brand-logo">janytree</div>
        <div class="header-menu">
            <span onclick="toggleHistory()" style="cursor:pointer;" title="계산 기록">⏳</span>
            <span onclick="toggleTheme()" style="cursor:pointer;" title="테마 전환">⚙️</span>
        </div>
    </header>

    <div class="history-drawer" id="history-box">
        <div class="history-title">
            <span>계산 기록</span>
            <span onclick="clearHistory()" style="color:red; cursor:pointer; font-size:11px;">전체 삭제</span>
        </div>
        <div class="history-list" id="history-container">
            <div style="color:#aaa; text-align:center; padding: 20px 0;" id="history-empty-text">기록이 없습니다.</div>
        </div>
    </div>

    <main class="calculator-island">
        <div class="display-container" onclick="copyToClipboard()" style="cursor: pointer;" title="클릭하면 결과가 복사됩니다">
            <div class="formula-screen" id="formula-display"></div>
            <div class="result-screen" id="result-display">0</div>
        </div>

        <div class="buttons-grid">
            <button class="btn btn-utility" onclick="clearAll()">C</button>
            <button class="btn btn-utility" onclick="backspace()">⌫</button>
            <button class="btn btn-operator" onclick="appendOperator('%')">%</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>

            <button class="btn btn-numeric" onclick="appendNumber('7')">7</button>
            <button class="btn btn-numeric" onclick="appendNumber('8')">8</button>
            <button class="btn btn-numeric" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

            <button class="btn btn-numeric" onclick="appendNumber('4')">4</button>
            <button class="btn btn-numeric" onclick="appendNumber('5')">5</button>
            <button class="btn btn-numeric" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">-</button>

            <button class="btn btn-numeric" onclick="appendNumber('1')">1</button>
            <button class="btn btn-numeric" onclick="appendNumber('2')">2</button>
            <button class="btn btn-numeric" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn btn-numeric" onclick="appendNumber('0')">0</button>
            <button class="btn btn-numeric" onclick="appendNumber('00')">00</button>
            <button class="btn btn-numeric" onclick="appendDecimal()">.</button>
            <button class="btn btn-equal" onclick="runCalculate()">=</button>

            <button class="btn btn-utility btn-vat" onclick="calculateVAT('include')">VAT +10%</button>
            <button class="btn btn-utility btn-vat" onclick="calculateVAT('exclude')">VAT -10%</button>
            <button class="btn btn-utility btn-vat" onclick="calculateVAT('taxOnly')">VAT 세액</button>
            <button class="btn btn-utility btn-vat" onclick="calculateVAT('taxInside')">VAT 내부</button>
        </div>
    </main>

    <footer class="brand-footer">janytree</footer>

    <div class="toast" id="toast-message">📋 결과값이 복사되었습니다!</div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let selectedOperator = '';
        let shouldResetDisplay = false;
        let calculationHistory = [];

        const formulaDisplay = document.getElementById('formula-display');
        const resultDisplay = document.getElementById('result-display');
        const historyContainer = document.getElementById('history-container');
        const historyEmptyText = document.getElementById('history-empty-text');
        const toastMessage = document.getElementById('toast-message');

        window.onload = function() {
            const savedHistory = localStorage.getItem('calc_history');
            if (savedHistory) {
                calculationHistory = JSON.parse(savedHistory);
                renderHistory();
            }
            
            // ⚠️ 안티그래비티 요청사항: 키보드 입력 감지 센서 작동 시작!
            document.addEventListener('keydown', handleKeyboardInput);
        };

        // ⌨️ 키보드 매핑 두뇌 탑재
        function handleKeyboardInput(event) {
            const key = event.key;
            
            // 0~9 숫자 키 및 소수점 인식
            if (!isNaN(key)) { appendNumber(key); }
            else if (key === '.') { appendDecimal(); }
            
            // 사칙연산 키 인식
            else if (key === '+') { appendOperator('+'); }
            else if (key === '-') { appendOperator('-'); }
            else if (key === '*') { appendOperator('*'); }
            else if (key === '/') { event.preventDefault(); appendOperator('/'); }
            else if (key === '%') { appendOperator('%'); }
            
            // 기능 키 인식 (엔터, 백스페이스, Esc)
            else if (key === 'Enter' || key === '=') { event.preventDefault(); runCalculate(); }
            else if (key === 'Backspace') { backspace(); }
            else if (key === 'Escape') { clearAll(); }
        }

        function toggleHistory() {
            document.getElementById('history-box').classList.toggle('show');
        }

        function formatNumberWithCommas(numberString) {
            const parts = numberString.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        function cleanCommas(formattedString) {
            return formattedString.replace(/,/g, '');
        }

        function updateDisplay() {
            resultDisplay.textContent = formatNumberWithCommas(currentInput);
            if (selectedOperator && previousInput !== '') {
                let opChar = selectedOperator;
                if (selectedOperator === '*') opChar = '×';
                if (selectedOperator === '/') opChar = '÷';
                formulaDisplay.textContent = `${formatNumberWithCommas(previousInput)} ${opChar}`;
            } else {
                formulaDisplay.textContent = '';
            }
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                if (currentInput === '0') {
                    if (num === '00' || num === '0') { currentInput = '0'; } 
                    else { currentInput = num; }
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0.';
                shouldResetDisplay = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes('.')) { currentInput += '.'; }
            updateDisplay();
        }

        function appendOperator(operator) {
            if (selectedOperator && !shouldResetDisplay) { executeMath(); }
            previousInput = currentInput;
            selectedOperator = operator;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function backspace() {
            if (shouldResetDisplay) return;
            if (currentInput.length > 1) { currentInput = currentInput.slice(0, -1); } 
            else { currentInput = '0'; }
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0'; previousInput = ''; selectedOperator = ''; shouldResetDisplay = false;
            updateDisplay();
        }

        function executeMath() {
            let result = 0;
            const prev = parseFloat(cleanCommas(previousInput));
            const current = parseFloat(cleanCommas(currentInput));
            if (isNaN(prev) || isNaN(current)) return;

            switch (selectedOperator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/':
                    if (current === 0) { alert('0으로 나눌 수 없습니다!'); clearAll(); return; }
                    result = prev / current;
                    break;
                case '%': result = (prev * current) / 100; break;
                default: return;
            }
            currentInput = parseFloat(result.toFixed(10)).toString();
        }

        function runCalculate() {
            if (!selectedOperator || previousInput === '') return;
            const formulaText = `${formatNumberWithCommas(previousInput)} ${selectedOperator === '*' ? '×' : selectedOperator === '/' ? '÷' : selectedOperator} ${formatNumberWithCommas(currentInput)}`;
            executeMath();
            const resultText = formatNumberWithCommas(currentInput);
            addHistoryItem(formulaText, resultText);
            selectedOperator = ''; previousInput = ''; shouldResetDisplay = true;
            updateDisplay();
        }

        function calculateVAT(type) {
            const rawVal = parseFloat(cleanCommas(currentInput));
            if (isNaN(rawVal) || rawVal === 0) return;
            let result = 0; let title = ''; let formula = '';

            switch (type) {
                case 'include': result = rawVal * 1.1; title = 'VAT+10%'; formula = `${formatNumberWithCommas(rawVal.toString())}+10%`; break;
                case 'exclude': result = rawVal / 1.1; title = 'VAT-10%'; formula = `${formatNumberWithCommas(rawVal.toString())}÷1.1`; break;
                case 'taxOnly': result = rawVal * 0.1; title = 'VAT세액'; formula = `${formatNumberWithCommas(rawVal.toString())}×0.1`; break;
                case 'taxInside': result = rawVal / 11; title = '내부세'; formula = `${formatNumberWithCommas(rawVal.toString())}÷11`; break;
            }
            result = Math.round(result);
            addHistoryItem(`[${title}] ${formula}`, formatNumberWithCommas(result.toString()));
            currentInput = result.toString(); shouldResetDisplay = true;
            updateDisplay();
        }

        function addHistoryItem(formula, result) {
            calculationHistory.unshift({ formula, result });
            if (calculationHistory.length > 20) calculationHistory.pop();
            localStorage.setItem('calc_history', JSON.stringify(calculationHistory));
            renderHistory();
        }

        function renderHistory() {
            const items = historyContainer.querySelectorAll('.history-item');
            items.forEach(el => el.remove());
            if (calculationHistory.length === 0) { historyEmptyText.style.display = 'block'; return; }
            historyEmptyText.style.display = 'none';

            calculationHistory.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = function() { currentInput = cleanCommas(item.result); shouldResetDisplay = true; updateDisplay(); };
                div.innerHTML = `<div style="color:#777; font-size:10px;">${item.formula}</div><div>${item.result}</div>`;
                historyContainer.appendChild(div);
            });
        }

        function clearHistory() {
            if (confirm('기록을 삭제할까요?')) { calculationHistory = []; localStorage.removeItem('calc_history'); renderHistory(); }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(formatNumberWithCommas(currentInput)).then(() => {
                toastMessage.classList.add('show');
                setTimeout(() => { toastMessage.classList.remove('show'); }, 2000);
            });
        }

        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') { body.setAttribute('data-theme', 'light'); } 
            else { body.setAttribute('data-theme', 'dark'); }
        }
    </script>
</body>
</html>
